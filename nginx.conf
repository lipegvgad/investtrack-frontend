server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Páginas do app (multipágina). Serve o arquivo pedido ou 404.
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache dos assets com hash gerados pelo Vite.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
