<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvestTrack — Entrar</title>
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <main class="auth">
      <section class="card">
        <div class="logo">InvestTrack</div>
        <p class="subtitulo">Gestão da sua carteira de investimentos</p>

        <div id="mensagem" class="mensagem" hidden></div>

        <form id="form-login">
          <label for="username">Usuário</label>
          <input id="username" name="username" type="text" autocomplete="username" required />

          <label for="password">Senha</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />

          <button class="btn" type="submit">Entrar</button>
        </form>

        <div class="links">
          <a href="forgot-password.html">Esqueceu a senha?</a>
          <a href="register.html">Criar conta</a>
        </div>
      </section>
    </main>
    <script type="module" src="/src/login.ts"></script>
  </body>
</html>
