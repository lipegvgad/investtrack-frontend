<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvestTrack — Redefinir senha</title>
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <main class="auth">
      <section class="card">
        <div class="logo">InvestTrack</div>
        <p class="subtitulo">Defina uma nova senha</p>

        <div id="mensagem" class="mensagem" hidden></div>

        <form id="form-reset">
          <label for="nova_senha">Nova senha</label>
          <input id="nova_senha" type="password" autocomplete="new-password" required />

          <label for="confirma_senha">Confirme a nova senha</label>
          <input id="confirma_senha" type="password" autocomplete="new-password" required />

          <button class="btn" type="submit">Redefinir senha</button>
        </form>

        <div class="links">
          <a href="index.html">Voltar ao login</a>
        </div>
      </section>
    </main>
    <script type="module" src="/src/reset.ts"></script>
  </body>
</html>
