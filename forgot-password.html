<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvestTrack — Esqueci a senha</title>
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <main class="auth">
      <section class="card">
        <div class="logo">InvestTrack</div>
        <p class="subtitulo">Recuperação de senha</p>

        <div id="mensagem" class="mensagem" hidden></div>

        <form id="form-esqueci">
          <label for="email">E-mail cadastrado</label>
          <input id="email" type="email" autocomplete="email" required />
          <button class="btn" type="submit">Enviar link de redefinição</button>
        </form>

        <p class="dica">
          Você receberá um e-mail com um link para criar uma nova senha.
        </p>

        <div class="links">
          <a href="index.html">Voltar ao login</a>
        </div>
      </section>
    </main>
    <script type="module" src="/src/forgot.ts"></script>
  </body>
</html>
