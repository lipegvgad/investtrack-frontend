<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvestTrack — Meu portfólio</title>
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="marca">InvestTrack</div>
      <div class="usuario">
        <span id="saudacao">Olá</span>
        <button id="btn-logout" class="btn-sec">Sair</button>
      </div>
    </header>

    <nav class="abas">
      <button data-aba="portfolio" class="ativo">Portfólio</button>
      <button data-aba="conta">Minha conta</button>
    </nav>

    <main class="conteudo">
      <!-- ============================ Portfólio ========================== -->
      <section id="view-portfolio" class="view">
        <div class="cards-resumo">
          <div class="card-resumo">
            <div class="rotulo">Total investido</div>
            <div class="valor" id="resumo-total">—</div>
          </div>
          <div class="card-resumo">
            <div class="rotulo">Ativos</div>
            <div class="valor" id="resumo-ativos">0</div>
          </div>
          <div class="card-resumo">
            <div class="rotulo">Aportes</div>
            <div class="valor" id="resumo-aportes">0</div>
          </div>
        </div>

        <div class="painel">
          <h2>Distribuição por tipo de ativo</h2>
          <ul class="lista-distribuicao" id="resumo-distribuicao">
            <li class="vazio">Carregando...</li>
          </ul>
        </div>

        <!-- ---------------------------- Ativos -------------------------- -->
        <div class="painel">
          <h2 id="form-ativo-titulo">Novo ativo</h2>
          <div id="ativo-msg" class="mensagem" hidden></div>
          <form id="form-ativo" class="grid-form">
            <input type="hidden" id="ativo-id" />
            <div>
              <label for="ativo-nome">Nome</label>
              <input id="ativo-nome" type="text" required />
            </div>
            <div>
              <label for="ativo-ticker">Ticker</label>
              <input id="ativo-ticker" type="text" placeholder="Ex.: PETR4" />
            </div>
            <div>
              <label for="ativo-tipo">Tipo</label>
              <select id="ativo-tipo" required>
                <option value="acao">Ação</option>
                <option value="fii">FII</option>
                <option value="renda_fixa">Renda Fixa</option>
                <option value="cripto">Criptomoeda</option>
                <option value="outro">Outro</option>
              </select>
            </div>
            <div>
              <label for="ativo-categoria">Categoria</label>
              <select id="ativo-categoria" required></select>
            </div>
            <div class="acoes-form">
              <button class="btn-pequeno" type="submit">Salvar</button>
              <button class="btn-sec" type="button" id="ativo-cancelar" hidden>
                Cancelar
              </button>
            </div>
          </form>

          <div class="barra-busca">
            <input id="ativo-busca" type="search" placeholder="Buscar ativo por nome ou ticker..." />
          </div>

          <table>
            <thead>
              <tr>
                <th>Ticker</th>
                <th>Nome</th>
                <th>Tipo</th>
                <th>Categoria</th>
                <th>Investido</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabela-ativos"></tbody>
          </table>
        </div>

        <!-- ---------------------------- Aportes ------------------------- -->
        <div class="painel">
          <h2 id="form-aporte-titulo">Novo aporte</h2>
          <div id="aporte-msg" class="mensagem" hidden></div>
          <form id="form-aporte" class="grid-form">
            <input type="hidden" id="aporte-id" />
            <div>
              <label for="aporte-ativo">Ativo</label>
              <select id="aporte-ativo" required></select>
            </div>
            <div>
              <label for="aporte-data">Data</label>
              <input id="aporte-data" type="date" required />
            </div>
            <div>
              <label for="aporte-quantidade">Quantidade</label>
              <input id="aporte-quantidade" type="number" step="0.000001" min="0" required />
            </div>
            <div>
              <label for="aporte-preco">Preço unitário (R$)</label>
              <input id="aporte-preco" type="number" step="0.01" min="0" required />
            </div>
            <div class="acoes-form">
              <button class="btn-pequeno" type="submit">Salvar</button>
              <button class="btn-sec" type="button" id="aporte-cancelar" hidden>
                Cancelar
              </button>
            </div>
          </form>

          <table>
            <thead>
              <tr>
                <th>Data</th>
                <th>Ativo</th>
                <th>Qtd.</th>
                <th>Preço unit.</th>
                <th>Total</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabela-aportes"></tbody>
          </table>
        </div>
      </section>

      <!-- ============================== Conta =========================== -->
      <section id="view-conta" class="view" hidden>
        <div class="colunas">
          <div class="painel">
            <h2>Dados do perfil</h2>
            <div id="perfil-msg" class="mensagem" hidden></div>
            <form id="form-perfil">
              <label for="perfil-nome">Nome</label>
              <input id="perfil-nome" type="text" />
              <label for="perfil-email">E-mail</label>
              <input id="perfil-email" type="email" />
              <button class="btn" type="submit">Salvar perfil</button>
            </form>
          </div>

          <div class="painel">
            <h2>Trocar senha</h2>
            <div id="senha-msg" class="mensagem" hidden></div>
            <form id="form-senha">
              <label for="senha-atual">Senha atual</label>
              <input id="senha-atual" type="password" autocomplete="current-password" required />
              <label for="senha-nova">Nova senha</label>
              <input id="senha-nova" type="password" autocomplete="new-password" required />
              <label for="senha-confirma">Confirme a nova senha</label>
              <input id="senha-confirma" type="password" autocomplete="new-password" required />
              <button class="btn" type="submit">Alterar senha</button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
